<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Release Tracker</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Music Release Tracker</h1>
        <nav>
            <button class="tab-btn active" data-tab="feed">Feed <span id="unseen-badge" class="badge hidden">0</span></button>
            <button class="tab-btn" data-tab="artists">Artists</button>
            <button class="tab-btn" data-tab="check">Check</button>
        </nav>
    </header>

    <main>
        <!-- Feed Tab -->
        <section id="tab-feed" class="tab-content active">
            <div class="filters">
                <select id="filter-artist">
                    <option value="">All Artists</option>
                </select>
                <select id="filter-type">
                    <option value="">All Types</option>
                    <option value="Album">Albums</option>
                    <option value="EP">EPs</option>
                </select>
                <label class="checkbox-label">
                    <input type="checkbox" id="filter-unseen"> New only
                </label>
            </div>
            <div id="release-list" class="release-list">
                <p class="empty-state">No releases yet. Add some artists to get started.</p>
            </div>
        </section>

        <!-- Artists Tab -->
        <section id="tab-artists" class="tab-content">
            <div class="search-bar">
                <input type="text" id="artist-search-input" placeholder="Search for an artist...">
                <button id="artist-search-btn">Search</button>
            </div>
            <div id="search-results" class="search-results"></div>
            <h2>Tracked Artists</h2>
            <div id="artist-list" class="artist-list">
                <p class="empty-state">No artists tracked yet.</p>
            </div>
        </section>

        <!-- Check Tab -->
        <section id="tab-check" class="tab-content">
            <button id="check-btn" class="check-btn">Check Now</button>
            <div id="check-progress" class="check-progress"></div>
            <div id="check-summary" class="check-summary"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
